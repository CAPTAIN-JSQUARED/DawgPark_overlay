<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawg Park — Broadcast Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

/* ── SCOREBOARD — bottom left ── */
.scoreboard {
  position: absolute;
  bottom: 40px;
  left: 36px;
  width: 380px;
}

/* Branding bar */
.brand-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(8, 10, 16, 0.92);
  border-radius: 10px 10px 0 0;
  padding: 8px 12px 8px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.brand-logo {
  width: 58px;
  height: 58px;
  object-fit: contain;
  flex-shrink: 0;
}
.brand-text {
  font-family: 'Oswald', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  line-height: 1.15;
  white-space: nowrap;
}
.brand-text span { color: #e8c44a; }

/* Teams panel */
.teams-panel {
  background: rgba(8, 10, 16, 0.92);
  border-radius: 0 0 10px 10px;
  overflow: hidden;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.7);
}

.team-row {
  display: flex;
  align-items: center;
  padding: 6px 14px;
  gap: 10px;
  position: relative;
}
.team-row:first-child {
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* Serve dots */
.serve-dots {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
  width: 10px;
}
.serve-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
}
.serve-dot.active {
  background: #ffffff;
  box-shadow: 0 0 6px rgba(255,255,255,0.6);
  animation: pulse 1.3s infinite;
}
.serve-dot.used {
  background: rgba(255,255,255,0.45);
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* Team name */
.team-name {
  font-family: 'Oswald', sans-serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: #ffffff;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Game pips */
.game-pips {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.game-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
}
.game-pip.won { background: #7fff3a; }

/* Score */
.team-score {
  font-family: 'Oswald', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: #ffffff;
  min-width: 38px;
  text-align: right;
  flex-shrink: 0;
}



/* Status */
.status-dot {
  position: absolute;
  top: 18px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.status-indicator {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #ff5a5a;
}
.status-indicator.live { background: #7fff3a; animation: pulse 1.5s infinite; }
.status-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}

/* Game over highlight */
.team-row.winner .team-name { color: #7fff3a; }
.team-row.winner .team-score { color: #7fff3a; }
</style>
</head>

        <div class="serve-dot" id="dot-1-1"></div>

      <div class="game-pips" id="t1-pips"></div>

        <div class="serve-dot" id="dot-2-1"></div>
        <div class="serve-dot" id="dot-2-2"></div>
      </div>
      <div class="team-name" id="t2-name">Team B</div>

<div class="status-dot">
  <div class="status-indicator" id="status-indicator"></div>
  <div class="status-label" id="status-label">Waiting</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAWRdfOYgD_uUMYj4lNJUpATR0h9NFf8so",
  authDomain: "broadcast-display.firebaseapp.com",
  databaseURL: "https://broadcast-display-default-rtdb.firebaseio.com",
  projectId: "broadcast-display",
  storageBucket: "broadcast-display.firebasestorage.app",
  messagingSenderId: "25910460566",
  appId: "1:25910460566:web:7f4911882d457b0b0a02b7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function set(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}

function renderState(s) {
  if (!s) return;

  var tn = s.teamNames || ['Team A', 'Team B'];
  var sc = s.scores || [0, 0];
  var gw = s.gamesWon || [0, 0];
  var st = s.servingTeam || 1;
  var sn = s.serverNumber || 2;
  var isFirst = s.isFirstService !== false;

  set('t1-name', tn[0]);
  set('t2-name', tn[1]);
  set('t1-score', sc[0]);
  set('t2-score', sc[1]);

  // Game pips (bo3)
  ['t1-pips','t2-pips'].forEach(function(id, ti) {
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    if (!s.bo3) return;
    for (var i = 0; i < 2; i++) {
      var pip = document.createElement('div');
      pip.className = 'game-pip' + (i < gw[ti] ? ' won' : '');
      el.appendChild(pip);
    }
  });

  // Serve dots — hidden for non-serving team, always 2 dots for serving team
  for (var t = 1; t <= 2; t++) {
    var d1 = document.getElementById('dot-' + t + '-1');
    var d2 = document.getElementById('dot-' + t + '-2');
    var dotsEl = document.getElementById('serve-dots-' + t);
    if (!d1 || !d2 || !dotsEl) continue;
    d1.style.visibility = 'visible';
    d2.style.visibility = 'visible';
    if (t !== st) {
      // Not serving — hide both
      dotsEl.style.visibility = 'hidden';
    } else {
      dotsEl.style.visibility = 'visible';
      if (!isFirst && sn === 1) {
        // 1st serve: dot 1 solid, dot 2 faded
        d1.className = 'serve-dot active';
        d2.className = 'serve-dot';
      } else {
        // 2nd serve or 0-0-2: dot 1 faded, dot 2 solid
        d1.className = 'serve-dot';
        d2.className = 'serve-dot active';
      }
    }
  }

  // Game over highlight
  document.getElementById('team-row-1').classList.remove('winner');
  document.getElementById('team-row-2').classList.remove('winner');
  if (s.gameOver) {
    var wi = sc[0] > sc[1] ? 1 : 2;
    document.getElementById('team-row-' + wi).classList.add('winner');
  }

  // Status
  document.getElementById('status-indicator').classList.add('live');
  set('status-label', 'Live');
}

onValue(ref(db, 'game/state'), function(snapshot) {
  var state = snapshot.val();
  if (state) {
    renderState(state);
  } else {
    document.getElementById('status-indicator').classList.remove('live');
    set('status-label', 'Waiting');
  }
}, function(err) {
  document.getElementById('status-indicator').classList.remove('live');
  set('status-label', 'Offline');
});
</script>
